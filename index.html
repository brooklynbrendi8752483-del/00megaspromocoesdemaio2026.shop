<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oferta Exclusiva</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:radial-gradient(circle at top,#0f172a,#020617);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:#fff;
}

/* CONTAINER */

.container{
width:100%;
max-width:420px;
padding:20px;
}

/* CARD */

.card{
background:linear-gradient(180deg,#020617,#0f172a);
border-radius:24px;
padding:30px;
text-align:center;
box-shadow:0 30px 100px rgba(0,0,0,0.9);
border:1px solid rgba(99,102,241,0.3);
position:relative;
overflow:hidden;
}

/* GLOW BACKGROUND */

.card::before{
content:"";
position:absolute;
width:300px;
height:300px;
background:radial-gradient(circle,#6366f1,transparent);
top:-100px;
right:-100px;
opacity:0.3;
}

/* BADGE */

.badge{
background:linear-gradient(90deg,#22c55e,#4ade80);
padding:8px 18px;
border-radius:50px;
font-size:12px;
font-weight:700;
display:inline-block;
margin-bottom:15px;
color:#022c22;
}

/* TITULO */

.title{
font-size:36px;
font-weight:900;
margin-bottom:10px;
background:linear-gradient(90deg,#a5b4fc,#38bdf8);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* SUB */

.subtitle{
font-size:14px;
color:#cbd5f5;
margin-bottom:20px;
}

/* PREÇO */

.price-box{
background:rgba(255,255,255,0.05);
border-radius:16px;
padding:20px;
margin-bottom:20px;
border:1px solid rgba(255,255,255,0.08);
}

.old{
text-decoration:line-through;
color:#94a3b8;
font-size:14px;
}

.new{
font-size:52px;
font-weight:900;
color:#22c55e;
margin-top:5px;
text-shadow:0 0 20px rgba(34,197,94,0.7);
}

/* LISTA */

.list{
text-align:left;
margin-bottom:25px;
}

.list div{
margin-bottom:10px;
font-size:14px;
}

/* BOTÃO */

.cta{
display:block;
background:linear-gradient(90deg,#22c55e,#4ade80);
padding:18px;
border-radius:14px;
font-size:20px;
font-weight:900;
text-decoration:none;
color:#022c22;
box-shadow:0 0 30px rgba(34,197,94,0.8);
transition:0.3s;
}

.cta:hover{
transform:scale(1.07);
box-shadow:0 0 50px rgba(34,197,94,1);
}

/* TIMER */

.timer{
margin-top:15px;
font-size:13px;
color:#f87171;
font-weight:bold;
}

/* FOOTER */

.footer{
margin-top:15px;
font-size:12px;
color:#64748b;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="badge">🔥 LIBERADO HOJE</div>

<div class="title">OFERTA SECRETA</div>

<div class="subtitle">
Você foi selecionado para essa condição exclusiva
</div>

<div class="price-box">
<div class="old">De R$ 7.865,00</div>
<div class="new">R$ 98,52</div>
</div>

<div class="list">
<div>✔ Acesso imediato após pagamento</div>
<div>✔ Desconto máximo ativado</div>
<div>✔ Suporte prioritário</div>
</div>

<a class="cta" href="https://comforting-blini-7a3dc5.netlify.app/
">
🚀 LIBERAR AGORA
</a>

<div class="timer">
⚠ Oferta pode encerrar a qualquer momento
</div>

<div class="footer">
🔒 Compra segura • Ambiente protegido
</div>

</div>

</div>

</body>
</html>
